<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>model-api-bridge</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">model-api-bridge</p>
          <h1>Model Bridge Console</h1>
          <p class="muted">多服务商模型接口桥接与回退控制台</p>
        </div>
        <nav class="nav" id="nav" hidden>
          <button data-view="dashboard" class="nav-link active">仪表盘</button>
          <button data-view="providers" class="nav-link">服务商</button>
          <button data-view="models" class="nav-link">模型路由</button>
          <button data-view="quotas" class="nav-link">额度</button>
          <button data-view="logs" class="nav-link">日志</button>
          <button data-view="system" class="nav-link">系统</button>
        </nav>
        <div class="sidebar-footer" id="sessionActions" hidden>
          <button id="logoutButton" class="ghost-button">退出登录</button>
        </div>
      </aside>

      <main class="content">
        <section id="authView" class="auth-card">
          <div id="setupPanel" hidden>
            <p class="eyebrow">首次初始化</p>
            <h2>创建管理员账号</h2>
            <form id="setupForm" class="stack-form">
              <label>
                管理员密码
                <input name="password" type="password" minlength="8" required />
              </label>
              <label>
                Gateway API Key
                <input name="gatewayApiKey" type="text" placeholder="客户端连接网关用，可选" />
              </label>
              <button type="submit">初始化并登录</button>
            </form>
          </div>

          <div id="loginPanel" hidden>
            <p class="eyebrow">管理员登录</p>
            <h2>进入控制台</h2>
            <form id="loginForm" class="stack-form">
              <label>
                密码
                <input name="password" type="password" required />
              </label>
              <button type="submit">登录</button>
            </form>
          </div>
        </section>

        <section id="appView" hidden>
          <header class="page-header">
            <div>
              <p class="eyebrow" id="pageEyebrow">控制台</p>
              <h2 id="pageTitle">仪表盘</h2>
            </div>
            <div class="status-pill" id="statusMessage">准备就绪</div>
          </header>

          <section class="panel active" data-panel="dashboard">
            <div class="card-grid" id="summaryCards"></div>
            <div class="two-column">
              <article class="panel-card">
                <h3>Provider 健康</h3>
                <div id="providerHealth"></div>
              </article>
              <article class="panel-card">
                <h3>即将耗尽的路由</h3>
                <div id="soonExhausted"></div>
              </article>
            </div>
            <article class="panel-card">
              <h3>最近切换</h3>
              <div id="recentSwitches"></div>
            </article>
          </section>

          <section class="panel" data-panel="providers">
            <div class="two-column">
              <article class="panel-card">
                <h3 id="providerFormTitle">新增服务商</h3>
                <form id="providerForm" class="stack-form">
                  <label>名称<input name="name" required /></label>
                  <label>Base URL<input name="baseUrl" required placeholder="https://api.example.com/v1" /></label>
                  <label>超时(ms)<input name="timeoutMs" type="number" value="25000" /></label>
                  <label>优先级<input name="priority" type="number" value="100" /></label>
                  <label class="checkbox"><input name="enabled" type="checkbox" checked /> 启用</label>
                  <label>首个 Key 标签<input name="keyLabel" placeholder="primary" /></label>
                  <label>首个 API Key<input name="apiKey" type="text" /></label>
                  <div class="row-actions">
                    <button type="submit" id="providerFormSubmit">创建服务商</button>
                    <button type="button" id="providerFormCancel" hidden>取消编辑</button>
                  </div>
                </form>
              </article>

              <article class="panel-card">
                <h3 id="providerKeyFormTitle">追加 API Key</h3>
                <form id="providerKeyForm" class="stack-form">
                  <label>
                    所属服务商
                    <select name="providerId" id="providerSelect"></select>
                  </label>
                  <label>Key 标签<input name="label" required placeholder="backup" /></label>
                  <label>API Key<input name="apiKey" required /></label>
                  <label class="checkbox"><input name="enabled" type="checkbox" checked /> 启用</label>
                  <div class="row-actions">
                    <button type="submit" id="providerKeyFormSubmit">添加 Key</button>
                    <button type="button" id="providerKeyFormCancel" hidden>取消编辑</button>
                  </div>
                </form>
              </article>
            </div>
            <article class="panel-card">
              <h3>服务商列表</h3>
              <div id="providersTable"></div>
            </article>
          </section>

          <section class="panel" data-panel="models">
            <div class="two-column">
              <article class="panel-card">
                <h3 id="groupFormTitle">新增逻辑模型组</h3>
                <form id="groupForm" class="stack-form">
                  <label>逻辑模型名<input name="name" required placeholder="gpt-4-class" /></label>
                  <label>能力等级<input name="capabilityLevel" value="standard" /></label>
                  <label>Fallback 策略<input name="fallbackPolicy" value="same-group" /></label>
                  <label class="checkbox"><input name="enabled" type="checkbox" checked /> 启用</label>
                  <div class="row-actions">
                    <button type="submit" id="groupFormSubmit">创建模型组</button>
                    <button type="button" id="groupFormCancel" hidden>取消编辑</button>
                  </div>
                </form>
              </article>

              <article class="panel-card">
                <h3 id="aliasFormTitle">新增统一模型名</h3>
                <form id="aliasForm" class="stack-form">
                  <label>统一模型名<input name="name" required placeholder="chat-main" /></label>
                  <label>指向逻辑模型组<select name="groupId" id="aliasGroupSelect"></select></label>
                  <label class="checkbox"><input name="enabled" type="checkbox" checked /> 启用</label>
                  <div class="row-actions">
                    <button type="submit" id="aliasFormSubmit">创建统一模型名</button>
                    <button type="button" id="aliasFormCancel" hidden>取消编辑</button>
                  </div>
                </form>
              </article>
            </div>
            <div class="two-column">
              <article class="panel-card">
                <h3 id="routeFormTitle">新增候选路由</h3>
                <form id="routeForm" class="stack-form">
                  <label>逻辑模型组<select name="groupId" id="groupSelect"></select></label>
                  <label>Provider Key<select name="providerKeyId" id="providerKeySelect"></select></label>
                  <label>上游模型名<input name="providerModelName" required /></label>
                  <label>优先顺序<input name="order" type="number" value="100" /></label>
                  <label>日额度<input name="dailyLimit" type="number" value="0" /></label>
                  <label>月额度<input name="monthlyLimit" type="number" value="0" /></label>
                  <label>告警阈值(%)<input name="warningThreshold" type="number" value="80" /></label>
                  <label class="checkbox"><input name="enabled" type="checkbox" checked /> 启用</label>
                  <div class="row-actions">
                    <button type="submit" id="routeFormSubmit">添加路由</button>
                    <button type="button" id="routeFormCancel" hidden>取消编辑</button>
                  </div>
                </form>
              </article>
              <article class="panel-card">
                <h3>统一模型名列表</h3>
                <div id="aliasTable"></div>
              </article>
            </div>
            <article class="panel-card">
              <h3>模型组与备选顺序</h3>
              <div id="groupsTable"></div>
            </article>
          </section>

          <section class="panel" data-panel="quotas">
            <article class="panel-card">
              <h3>额度配置</h3>
              <p class="muted">以“Provider Key + 模型路由”为粒度统计请求次数。</p>
              <div id="quotaTable"></div>
            </article>
          </section>

          <section class="panel" data-panel="logs">
            <div class="two-column">
              <article class="panel-card">
                <h3>请求日志</h3>
                <div id="requestLogs"></div>
              </article>
              <article class="panel-card">
                <h3>切换日志</h3>
                <div id="switchLogs"></div>
              </article>
            </div>
          </section>

          <section class="panel" data-panel="system">
            <div class="two-column">
              <article class="panel-card">
                <h3>Gateway 设置</h3>
                <form id="systemForm" class="stack-form">
                  <label>新的 Gateway API Key<input name="gatewayApiKey" placeholder="留空则不修改" /></label>
                  <button type="submit">更新 Gateway Key</button>
                </form>
                <div id="gatewaySnippet" class="snippet"></div>
              </article>
              <article class="panel-card">
                <h3>管理员密码</h3>
                <form id="passwordForm" class="stack-form">
                  <label>当前密码<input name="currentPassword" type="password" required /></label>
                  <label>新密码<input name="newPassword" type="password" minlength="8" required /></label>
                  <button type="submit">修改密码</button>
                </form>
              </article>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
